name: Deploy funding radar

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy_attempt_1.outputs.page_url || steps.deploy_attempt_2.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp web/index.html web/styles.css web/app.js _site/
          cp -R web/assets _site/assets
          cp -R web/data _site/data
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy_attempt_1
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before retrying Pages deployment
        if: steps.deploy_attempt_1.outcome == 'failure'
        run: sleep 60

      - name: Retry GitHub Pages deployment
        id: deploy_attempt_2
        if: steps.deploy_attempt_1.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Fail if Pages deployment did not complete
        if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
        run: |
          echo "GitHub Pages deployment failed after two attempts."
          exit 1
